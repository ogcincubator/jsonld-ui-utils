name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to re-release (e.g. v0.2.4)'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile --ignore-scripts

      - name: Pack npm tarball
        run: npm pack --ignore-scripts && mv opengeospatial-jsonld-ui-utils-*.tgz jsonld-ui-utils.tgz

      - name: Publish to npm
        run: npm publish jsonld-ui-utils.tgz --provenance --access public

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: |
            dist/*.js
            dist/*.css
            dist/*.map
            jsonld-ui-utils.tgz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  pages:
    needs: build
    uses: ./.github/workflows/pages.yml
    permissions:
      pages: write
      id-token: write
