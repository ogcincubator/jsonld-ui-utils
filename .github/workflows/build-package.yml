name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: yarn

      - name: Install dependencies
        env:
          YARN_IGNORE_PREPARE: 'true'
        run: yarn install --frozen-lockfile

      - name: Build project
        run: yarn build

      - name: Pack npm tarball
        run: npm pack && mv opengeospatial-jsonld-ui-utils-*.tgz jsonld-ui-utils.tgz

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.js
            dist/*.css
            dist/*.map
            jsonld-ui-utils.tgz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  pages:
    needs: build
    uses: ./.github/workflows/pages.yml
