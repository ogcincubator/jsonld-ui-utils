<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>JSON-LD UI Utils — Leaflet Plugin Demo</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/avillar/jsonld-ui-utils@v0.2.2/dist/jsonld-ui-utils.css"/>
  <style>
    body { margin: 0; font-family: sans-serif; }
    #map { height: 100vh; }
    .jsonld-popup { max-height: 300px; overflow-y: scroll; }
  </style>
</head>
<body>
  <div id="map"></div>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/avillar/jsonld-ui-utils@v0.2.2/dist/jsonld-ui-utils-leaflet.min.js"></script>
  <script>
    const CONTEXT = 'https://ogcincubator.github.io/bblocks-examples/build/annotated/bbr/examples/observation/vectorObservationFeature/context.jsonld';

    const features = {
      type: 'FeatureCollection',
      features: [
        {
          id: 'vector-obs-1',
          type: 'Feature',
          geometry: {
            type: 'LineString',
            coordinates: [
              [-111.67183507997295, 40.056709946862874],
              [-111.71, 40.096709946862875],
            ],
          },
          properties: {
            hasFeatureOfInterest: 'eg:Traverse-P1-P2',
            observedProperty: 'https://w3id.org/ad4gd/air-quality/properties/CO2',
            resultTime: '2023-05-22T16:41:00+02:00',
            hasResult: {
              pose: {
                position: { lat: 40.056709946862874, lon: -111.67183507997295, h: 0.5 },
                angles: { yaw: 15.35, pitch: -0.01, roll: 0 },
              },
              distance: 4250.3,
            },
          },
        },
        {
          id: 'vector-obs-2',
          type: 'Feature',
          geometry: {
            type: 'Point',
            coordinates: [-111.63, 40.08],
          },
          properties: {
            hasFeatureOfInterest: 'eg:Station-P3',
            observedProperty: 'https://w3id.org/ad4gd/air-quality/properties/temperature',
            resultTime: '2023-05-22T17:00:00+02:00',
            hasResult: {
              pose: {
                position: { lat: 40.08, lon: -111.63, h: 1372 },
                angles: { yaw: 0, pitch: 0, roll: 0 },
              },
              distance: 0,
            },
          },
        },
        {
          id: 'vector-obs-3',
          type: 'Feature',
          geometry: {
            type: 'Polygon',
            coordinates: [[
              [-111.72, 40.10],
              [-111.68, 40.10],
              [-111.68, 40.13],
              [-111.72, 40.13],
              [-111.72, 40.10],
            ]],
          },
          properties: {
            hasFeatureOfInterest: 'eg:Area-P4-P7',
            observedProperty: 'https://w3id.org/ad4gd/air-quality/properties/windSpeed',
            resultTime: '2023-05-22T18:15:00+02:00',
            hasResult: {
              pose: {
                position: { lat: 40.115, lon: -111.70, h: 1420 },
                angles: { yaw: 270, pitch: 0, roll: 0 },
              },
              distance: 3200,
            },
          },
        },
      ],
    };

    const map = L.map('map');
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
      maxZoom: 19,
    }).addTo(map);

    const layer = jsonldUIUtilsLeaflet.createJsonLDGeoJSONLayer(L, features, {
      ldContext: CONTEXT,
      popupOptions: { maxWidth: 420 },
      augmentOptions: {
        fallbackSparqlEndpoints: 'https://defs-hosted.opengis.net/prez-hosted-b/sparql',
      },
    });

    layer.addTo(map);
    const bounds = layer.getBounds();
    if (bounds.isValid()) map.fitBounds(bounds, {padding: [40, 40]});
  </script>
</body>
</html>
